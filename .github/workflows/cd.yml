name: CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
      - 'docs/**'
      - '.env.example'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/data_eng
          token: ${{ secrets.GH_TOKEN }}

      - name: Checkout Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/repo_infra
          token: ${{ secrets.GH_TOKEN }}
          path: terraform

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/infra
        run: |
          terraform init -input=false

      - name: Get Terraform Outputs
        working-directory: terraform/infra
        run: |
          echo "S3_BUCKET_1=$(terraform output -raw scripts_bucket_name)" >> $GITHUB_ENV
          echo "S3_KEY_1=$(terraform output -raw glue_script_s3_uri)" >> $GITHUB_ENV
          echo "GLUE_JOB_1=$(terraform output -raw glue_job_name)" >> $GITHUB_ENV


      - name: Build S3 path
        run: |
          echo "S3_PATH_1=$S3_KEY_1" >> $GITHUB_ENV


      - name: Debug S3 path
        run: |
          echo "BUCKET=$S3_BUCKET_1"
          echo "KEY=$S3_KEY_1"
          echo "FULL=$S3_PATH_1"

      - name: Backup Current Glue Scripts
        run: |
          set -euo pipefail
          mkdir -p .backups
          echo "[INFO] Backing up current Glue scripts before deployment..."
          aws s3 cp s3://$S3_KEY_1 .backups/glue_job_1_backup.py 2>/dev/null || echo "[WARN] No current script for job 1"
          echo "[✓] Backup completed"

      - name: Replace Glue script in S3
        run: |
          aws s3 cp src/jobs/sum.py $S3_PATH_1

      # ─────────────────────────────
      # 10. Trigger Glue Jobs + capturer les Run IDs
      # FIX: on récupère les RUN_ID pour que le smoke test surveille
      #      ces runs précis, sans relancer les jobs une 2ème fois
      # ─────────────────────────────
      - name: Trigger Glue Jobs
        run: |
          CONFIG_BUCKET=""
          CONFIG_PATH="s3://${CONFIG_BUCKET}/config.json"

          RUN1=$(aws glue start-job-run --job-name "$GLUE_JOB_1" --arguments '{"--CONFIG_PATH":"'"$CONFIG_PATH"'"}' --query "JobRunId" --output text)
          echo "RUN_ID_1=$RUN1" >> $GITHUB_ENV

          echo "Jobs lancés : $RUN1"

      # ─────────────────────────────
      # 11. SMOKE TEST
      # FIX 1: surveille les runs existants (RUN_ID) → plus de double lancement
      # FIX 2: polling en parallèle (background) → tous les jobs checkés en même temps
      # ─────────────────────────────
      - name: Smoke Test - Validate Glue Jobs
        run: |
          set -euo pipefail

          MAX_RETRIES=25
          SLEEP_TIME=25

          # Surveille un run déjà lancé (RUN_ID passé en argument)
          # FIX : prend JOB_NAME + RUN_ID existant, ne relance PAS le job
          watch_run() {
            local JOB_NAME=$1
            local RUN_ID=$2

            echo "▶ Watching [$JOB_NAME] run: $RUN_ID"

            local STATUS="STARTING"
            local COUNT=0

            while [[ "$STATUS" == "STARTING" || "$STATUS" == "RUNNING" ]]; do
              STATUS=$(aws glue get-job-run \
                --job-name "$JOB_NAME" \
                --run-id "$RUN_ID" \
                --query 'JobRun.JobRunState' \
                --output text)

              echo "  [$JOB_NAME] → $STATUS"

              COUNT=$((COUNT + 1))
              if [ "$COUNT" -ge "$MAX_RETRIES" ]; then
                echo "❌ TIMEOUT: $JOB_NAME ($RUN_ID)"
                return 1
              fi

              sleep "$SLEEP_TIME"
            done

            if [ "$STATUS" != "SUCCEEDED" ]; then
              echo "❌ FAILED: $JOB_NAME ($RUN_ID) — état final: $STATUS"
              return 1
            fi

            echo "✅ PASSED: $JOB_NAME"
            return 0
          }

          watch_run "$GLUE_JOB_1" "$RUN_ID_1" &

          # Attendre tous les processus et échouer si l'un d'eux échoue
          FAILED=0
          for pid in $(jobs -p); do
            wait "$pid" || FAILED=1
          done

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ Un ou plusieurs jobs Glue ont échoué."
            exit 1
          fi

          echo ""
          echo "✅ Tous les smoke tests sont passés."

      # ─────────────────────────────
      # 12. ROLLBACK ON FAILURE
      # Restore the backed up scripts from .backups/
      # ─────────────────────────────
      - name: Rollback - Restore Backups
        if: failure()
        run: |
          set -euo pipefail
          echo ""
          echo "🔴 SMOKE TEST FAILED - INITIATING ROLLBACK"
          echo ""
          echo "[ROLLBACK 1] Restoring old script for $GLUE_JOB_1..."
          aws s3 cp .backups/glue_job_1_backup.py s3://$S3_KEY_1 || echo "[WARN] Could not restore backup for job 1"
          echo "[ROLLBACK 1] Restarting $GLUE_JOB_1 with old script..."
          NEW_RUN=$(aws glue start-job-run --job-name $GLUE_JOB_1 --query 'JobRunId' --output text 2>/dev/null || echo "ERROR")
          if [ "$NEW_RUN" != "ERROR" ]; then echo "[✓] Job 1 restarted with RUN_ID=$NEW_RUN"; else echo "[ERROR] Failed to restart job 1"; fi

          echo ""
          echo "✅ Rollback completed - old scripts restored and jobs restarted"
          echo "   → Monitor CloudWatch logs for execution status"
