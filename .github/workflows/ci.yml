name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
      - 'docs/**'
      - '.env.example'
  workflow_dispatch:

jobs:

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Data Engineering Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/data_eng
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30


  sonar:
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Data Engineering Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/data_eng
          token: ${{ secrets.GH_TOKEN }}

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: Verify coverage file
        run: |
          ls -la

          if [ ! -f coverage.xml ]; then
            echo "ERROR: coverage.xml not found"
            exit 1
          fi

          if grep -q '/home/runner/work' coverage.xml; then
            echo "Fixing absolute paths..."
            sed -i 's|/home/runner/work/data_eng/data_eng/||g' coverage.xml
          fi

          head -10 coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        with:
          args: >
            -Dsonar.projectKey=mohamedamine050_data_eng
            -Dsonar.organization=mohamedamine050
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  infra-provisioning:
    needs: sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/repo_infra
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3


      # ─────────────────────────────
      # BOOTSTRAP (S3 + DynamoDB)
      # ─────────────────────────────
      - name: Bootstrap Init
        working-directory: bootstrap
        run: terraform init

      - name: Bootstrap Apply
        working-directory: bootstrap
        run: terraform apply -auto-approve

      - name: Get Bootstrap Outputs
        working-directory: bootstrap
        run: |
          S3_BUCKET=$(terraform output -raw s3_bucket_name || echo "")

          if [ -z "$S3_BUCKET" ]; then
            echo "ERROR: S3_BUCKET is empty"
            exit 1
          fi

          echo "S3_BUCKET=$S3_BUCKET"
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV


      # ─────────────────────────────
      # INFRA
      # ─────────────────────────────
      - name: Infra Init
        working-directory: infra
        run: terraform init

      - name: Infra Apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Export Terraform Outputs
        working-directory: infra
        run: terraform output -json > tf_output.json
