name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - 'README.md'
      - 'docs/**'
      - '.env.example'
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Data Engineering Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/data_eng
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  sonar:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Data Engineering Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/data_eng
          token: ${{ secrets.GH_TOKEN }}
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .
      - name: Verify coverage file
        run: |
          echo '=== Checking workspace ===' 
          ls -la
          if [ -f coverage.xml ]; then
            echo '✓ Coverage report found'
            echo '=== Verifying paths in coverage.xml ===' 
            if grep -q '/home/runner/work' coverage.xml; then
              echo '⚠ WARNING: Still contains absolute paths, fixing...'
              sed -i 's|/home/runner/work/data_eng/data_eng/||g' coverage.xml
            fi
            echo '=== Coverage file (first 10 lines) ===' 
            head -10 coverage.xml
          else
            echo '✗ ERROR: coverage.xml not found!'
            exit 1
          fi
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        with:
          args: -Dsonar.projectKey=mohamedamine050_data_eng -Dsonar.organization=mohamedamine050 -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  infra-provisioning:
    needs: sonar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Terraform Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/repo_infra
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}


      - uses: hashicorp/setup-terraform@v3

      - name: Bootstrap apply
        working-directory: bootstrap
        run: |
          terraform init

      - name: Infra apply
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Terraform Output
        working-directory: infra
        run: terraform output -json > tf_output.json

      - name: Get S3 bucket name (bootstrap)
        working-directory: bootstrap
        run: |
          echo '=== Fetching s3_bucket_name from Terraform outputs ==='
          if terraform output -raw s3_bucket_name >/dev/null 2>&1; then
            S3_NAME=$(terraform output -raw s3_bucket_name 2>&1)
            if [ -z "$S3_NAME" ]; then
              echo '⚠ WARNING: s3_bucket_name output exists but is EMPTY'
              echo 'Available outputs:'
              terraform output
            else
              echo "S3_BUCKET_NAME=$S3_NAME"
              echo $S3_NAME > s3_bucket_name.txt
            fi
          else
            echo '⚠ ERROR: s3_bucket_name output not found in bootstrap module'
            echo 'Available outputs:'
            terraform output 2>&1 || echo 'No outputs available'
          fi