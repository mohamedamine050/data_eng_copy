name: CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**'
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Data Engineering Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/data_eng_copy
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  sonar:
   
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Data Engineering Repo
        uses: actions/checkout@v4
        with:
          repository: mohamedamine050/data_eng_copy
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0  # <--- INDISPENSABLE pour le Quality Gate (info de blame)
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .
      - name: Verify coverage file
        run: |
          echo '=== Checking workspace ===' 
          ls -la
          if [ -f coverage.xml ]; then
            echo '✓ Coverage report found'
            echo '=== Verifying paths in coverage.xml ===' 
            if grep -q '/home/runner/work' coverage.xml; then
              echo '⚠ WARNING: Still contains absolute paths, fixing...'
              sed -i 's|/home/runner/work/data_eng_copy/data_eng_copy/||g' coverage.xml
            fi
            echo '=== Coverage file (first 10 lines) ===' 
            head -10 coverage.xml
          else
            echo '✗ ERROR: coverage.xml not found!'
            exit 1
          fi
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v3
        with:
          args: -Dsonar.projectKey=mohamedamine050_data_eng_copy -Dsonar.organization=mohamedamine050 -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
